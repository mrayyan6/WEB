<!DOCTYPE html>
<html>

<body>

    <h1>Get hands on with JavaScript's Fetch API</h1>
    <p>Write your requests in the script and watch the console and network logs.</p>


    <script>
        // GET retrieve all to-do's
        fetch('https://jsonplaceholder.typicode.com/todos')
            .then(response => response.json())
            .then(json => console.log(json))
        // will return all resources

        // POST adds a random id to the object sent
        fetch('https://jsonplaceholder.typicode.com/todos', {
            method: 'POST',
            body: JSON.stringify({
                userId: 1,
                title: "clean room",
                completed: false
            }),
            headers: {
                "Content-type": "application/json; charset=UTF-8"
            }
        })
            .then(response => response.json())
            .then(json => console.log(json))

        /* will return
        {
            "userId": 1,
            "title": "clean room",
            "completed": false,
            "id": 201
        }
        */

        // PUT to the resource with id = 5 to change the name of task
        fetch('https://jsonplaceholder.typicode.com/todos/5', {
            method: 'PUT',
            body: JSON.stringify({
                userId: 1,
                id: 5,
                title: "hello task",
                completed: false
            }),
            headers: {
                "Content-type": "application/json; charset=UTF-8"
            }
        })
            .then(response => response.json())
            .then(json => console.log(json))

        /* will return
        {
            "userId": 1,
            "id": 5,
            "title": "hello task",
            "completed": false
        }
        */

    </script>

</body>

</html>
